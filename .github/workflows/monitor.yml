name: Monitor Proposições CMRJ

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 BRT
    - cron: '0 15 * * *'   # 12:00 BRT
    - cron: '0 20 * * *'   # 17:00 BRT
    - cron: '0 0 * * *'    # 21:00 BRT
  workflow_dispatch:

jobs:
  monitorar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Restaurar estado salvo
        run: |
          if [ ! -f estado.json ]; then
            echo '{"proposicoes_vistas":[],"ultima_execucao":""}' > estado.json
          fi

      - name: Executar monitor
        env:
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: node monitor.js

      - name: Salvar estado no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add estado.json
          git diff --staged --quiet || git commit -m "chore: atualiza estado [skip ci]"
          git push
