name: Monitor Proposições CMRJ

env:
  TZ: America/Sao_Paulo

on:
  workflow_dispatch:
  schedule:
    # Segunda a sexta 05:00 BRT
    - cron: '0 8 * * 1-5'

concurrency:
  group: monitor-proposicoes-cmrj
  cancel-in-progress: false

jobs:
  monitorar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Checar calendário operacional
        id: calendario
        run: node scripts/should-run.js

      - name: Restaurar estado salvo
        if: steps.calendario.outputs.skip != 'true'
        run: |
          if [ ! -f estado.json ]; then
            echo '{"proposicoes_vistas":[],"ultima_execucao":""}' > estado.json
          fi

      - name: Executar monitor
        if: steps.calendario.outputs.skip != 'true'
        env:
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          FIRJAN_DESTINO: tramitacao@monitorlegislativo.com.br
          FIRJAN_ASSUNTO_PREFIXO: "PREVIEW | "
          MONITOR_USER: ${{ secrets.MONITOR_USER }}
          MONITOR_PASS: ${{ secrets.MONITOR_PASS }}
          FIRJAN_CLIENTE_ID: "57"
        run: |
          export NODE_TLS_REJECT_UNAUTHORIZED=0
          node monitor.js

      - name: Salvar estado no repositório
        if: steps.calendario.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add estado.json
          git diff --staged --quiet || git commit -m "chore: atualiza estado [skip ci]"
          git pull --rebase origin main
          git push

      - name: Alertar falha interna
        if: failure() && steps.calendario.outputs.skip != 'true'
        env:
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          MONITOR_NOME: "FIRJAN CMRJ Proposições Novas"
        run: node scripts/send-failure-alert.js
